<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpenBattle</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>QuizOpenBattle</h1>

    <div id="login-screen">
        <input type="text" id="nickname" placeholder="ニックネーム">
        <button id="join-btn">ゲームに参加</button>
    </div>

    <div id="game-screen" style="display: none;">
        <p>あなたの名前: <span id="my-name" style="font-weight: bold;"></span></p>

        <input type="text" id="answer-box" placeholder="解答を入力...">
        <button id="action-btn">解答を送信</button>

        <hr>
        <h3>サーバーからの受信データ</h3>
        <p>全体公開情報: <span id="public-info">-</span></p>
        <p>あなただけの情報: <span id="private-info">-</span></p>

        <h3>参加者一覧</h3>
        <ul id="participants-list"></ul>
    </div>

    <div id="confirm-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-message">
        <div class="modal-card">
            <p id="confirm-message"></p>
            <div class="modal-actions">
                <button id="confirm-cancel-btn" type="button">キャンセル</button>
                <button id="confirm-ok-btn" type="button">送信する</button>
            </div>
        </div>
    </div>

    <div id="alert-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="alert-message">
        <div class="modal-card">
            <p id="alert-message"></p>
            <div class="modal-actions single">
                <button id="alert-ok-btn" type="button">OK</button>
            </div>
        </div>
    </div>

    <script src="client.js"></script>
</body>

</html>
