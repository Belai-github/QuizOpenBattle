<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpenBattle</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>QuizOpenBattle</h1>

    <div id="login-screen">
        <input type="text" id="nickname" placeholder="ニックネーム">
        <button id="join-btn">ゲームに参加</button>
    </div>

    <div id="waiting-room-screen" style="display: none;">
        <p>あなたの名前: <span id="my-name" style="font-weight: bold;"></span></p>

        <div class="question-input-row">
            <span class="question-prefix">Q.</span>
            <textarea id="question-box" rows="3" placeholder="問題を入力..."></textarea>
        </div>
        <button id="submit-question-btn">出題</button>

        <hr>
        <div id="waiting-panels">
            <div>
                <div id="event-log-box">
                    <div id="event-log"></div>
                </div>
                <div id="lobby-chat-box">
                    <textarea id="lobby-chat-input" rows="1" maxlength="200" placeholder="ロビーチャットを入力..."></textarea>
                    <p id="lobby-chat-length-warning" class="hidden" aria-live="polite">⚠️送信できる文字数は200文字までです</p>
                    <button id="lobby-chat-send-btn" type="button">送信</button>
                </div>
            </div>

            <div>
                <div id="room-list-box">
                    <div id="room-list"></div>
                </div>
            </div>
        </div>
        <h3>ログインプレイヤー</h3>
        <ul id="participants-list"></ul>
    </div>

    <div id="game-arena-screen" style="display: none;">
        <div id="leave-game-arena" role="button" tabindex="0" aria-label="部屋を閉じる">☓部屋を閉じる</div>

        <h3 id="arena-room-title">出題者: -</h3>

        <div id="arena-board-layout">
            <div id="arena-player-left" class="arena-player-box left">
                <div class="arena-player-label">先行</div>
                <ul id="arena-player-left-list"></ul>
            </div>

            <div id="arena-question-board">
                <p id="arena-question-text">問題文を準備中...</p>
            </div>

            <div id="arena-player-right" class="arena-player-box right">
                <div class="arena-player-label">後攻</div>
                <ul id="arena-player-right-list"></ul>
            </div>
        </div>

        <div id="arena-spectator-box">
            <div class="arena-spectator-label">観戦者</div>
            <ul id="arena-spectator-list"></ul>
        </div>
    </div>

    <div id="confirm-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-message">
        <div class="modal-card">
            <p id="confirm-message"></p>
            <div class="modal-actions">
                <button id="confirm-cancel-btn" type="button">キャンセル</button>
                <button id="confirm-ok-btn" type="button">送信する</button>
            </div>
        </div>
    </div>

    <div id="alert-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="alert-message">
        <div class="modal-card">
            <p id="alert-message"></p>
            <div class="modal-actions single">
                <button id="alert-ok-btn" type="button">OK</button>
            </div>
        </div>
    </div>

    <script src="client.js"></script>
</body>

</html>
